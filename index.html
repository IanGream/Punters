<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Punters Club Puntoff</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0f1720;
    --card: #16202b;
    --accent: #3ddc97;
    --accent-dim: #2a9d70;
    --text: #e8edf2;
    --text-dim: #9aa8b5;
    --border: #263340;
    --pos: #3ddc97;
    --neg: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: linear-gradient(180deg, #0f1720 0%, #101b26 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1200px; margin: 0 auto; }
  header.page-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 4px 0;
    letter-spacing: 0.5px;
  }
  .subtitle {
    color: var(--text-dim);
    margin: 0;
    font-size: 14px;
  }
  .upload-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    flex-shrink: 0;
  }
  .status-dot.stale { background: #ffb84d; }
  #file-status { font-size: 12px; }
  h2 {
    font-size: 18px;
    margin: 40px 0 14px 0;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h2::before {
    content: "";
    width: 4px;
    height: 18px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  #rounds-table {
    width: auto;
    min-width: 100%;
  }
  #rounds-table th,
  #rounds-table td {
    min-width: 90px;
  }
  th, td {
    padding: 10px 14px;
    text-align: right;
    white-space: nowrap;
  }
  th:first-child, td:first-child {
    text-align: left;
  }
  thead th {
    background: #1c2733;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s ease;
  }
  tbody tr:hover { background: rgba(61, 220, 151, 0.06); }
  tbody tr:last-child { border-bottom: none; }
  .rank {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #263340;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 700;
    margin-right: 8px;
  }
  .rank.gold { background: #4a3b12; color: #ffd66b; }
  .rank.silver { background: #33383e; color: #d4d9dd; }
  .rank.bronze { background: #3b2416; color: #e0a06b; }
  .name-cell { font-weight: 600; }
  .pct-pos { color: var(--pos); font-weight: 600; }
  .pct-neg { color: var(--neg); font-weight: 600; }
  .total-row td {
    background: #1c2733;
    font-weight: 700;
    color: var(--text);
    border-top: 2px solid var(--border);
  }
  .table-scroll {
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--accent-dim) #1c2733;
  }
  .table-scroll::-webkit-scrollbar {
    height: 10px;
  }
  .table-scroll::-webkit-scrollbar-track {
    background: #1c2733;
  }
  .table-scroll::-webkit-scrollbar-thumb {
    background: var(--accent-dim);
    border-radius: 6px;
  }
  .table-scroll::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }
  #rounds-table th:nth-child(1),
  #rounds-table td:nth-child(1),
  #rounds-table th:nth-child(2),
  #rounds-table td:nth-child(2) {
    position: sticky;
    background: var(--card);
    z-index: 2;
  }
  #rounds-table th:nth-child(1),
  #rounds-table td:nth-child(1) { left: 0; min-width: 90px; }
  #rounds-table th:nth-child(2),
  #rounds-table td:nth-child(2) { left: 90px; min-width: 100px; box-shadow: 2px 0 4px rgba(0,0,0,0.25); }
  #rounds-table thead th:nth-child(1),
  #rounds-table thead th:nth-child(2) { background: #1c2733; z-index: 3; }
  #rounds-table tbody tr.total-row td:nth-child(1),
  #rounds-table tbody tr.total-row td:nth-child(2) { background: #1c2733; }
  .empty-cell { color: #3c4a58; }
  .rounds-note {
    font-size: 13px;
    color: var(--text-dim);
    margin: -8px 0 14px 0;
  }
  footer {
    margin-top: 40px;
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
  }
  .error-banner {
    background: #3b1f1f;
    border: 1px solid #6b2f2f;
    color: #ffb3b3;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="page-head">
    <div>
      <h1>🏇 Punters Club Puntoff</h1>
      <p class="subtitle">Season leaderboard and round-by-round betting log</p>
    </div>
    <div class="upload-box">
      <span class="status-dot" id="status-dot"></span>
      <div>
        <div id="file-status">Loading latest data…</div>
      </div>
    </div>
  </header>

  <div class="error-banner" id="error-banner"></div>

  <h2>Leaderboard</h2>
  <div class="card table-scroll">
    <table>
      <thead>
        <tr id="leaderboard-head"></tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
  </div>

  <h2>Rounds</h2>
  <p class="rounds-note" id="rounds-note"></p>
  <div class="card table-scroll">
    <table id="rounds-table">
      <thead>
        <tr id="rounds-head"></tr>
      </thead>
      <tbody id="rounds-body"></tbody>
    </table>
  </div>

</div>

<script>
const money = n => (n === null || n === undefined || isNaN(n)) ? "—" :
  "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const pct = n => (n === null || n === undefined || isNaN(n)) ? "—" : (Number(n) * 100).toFixed(1) + "%";

function showError(msg) {
  const banner = document.getElementById("error-banner");
  banner.textContent = msg;
  banner.style.display = msg ? "block" : "none";
}

// Find a row (array) in a sheet's array-of-arrays where a given column matches a predicate
function findRowIndex(rows, colIdx, predicate, fromRow) {
  for (let i = fromRow || 0; i < rows.length; i++) {
    const row = rows[i] || [];
    if (predicate(row[colIdx])) return i;
  }
  return -1;
}

function parseSummarySheet(rows) {
  // Header row has "Punter" in col 0
  const headerIdx = findRowIndex(rows, 0, v => typeof v === "string" && v.toLowerCase().includes("punter"));
  if (headerIdx === -1) throw new Error('Could not find the "Punter" header in the Summary sheet.');
  const headerRow = rows[headerIdx];

  const punters = [];
  let totals = null;
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i] || [];
    const name = row[0];
    if (name === undefined || name === null || name === "") continue;
    if (typeof name === "string" && name.toLowerCase() === "total") {
      totals = { bet: row[1], ret: row[2], pct: row[3] };
      break;
    }
    punters.push({ name: String(name), bet: row[1], ret: row[2], pct: row[3] });
  }
  return { headers: headerRow.slice(0, 4), punters, totals };
}

function parseRoundsSheet(rows) {
  // "Bets up to Round" row gives the latest round with data
  const upToIdx = findRowIndex(rows, 0, v => typeof v === "string" && v.toLowerCase().includes("bets up to round"));
  let upToRound = null;
  if (upToIdx !== -1) upToRound = rows[upToIdx][1];

  // Header row has "Punter" in col 0 (exact match, not just containing the word,
  // since the sheet's title row also contains "Punters") and "Bet per Round" in col 1
  let headerIdx = findRowIndex(rows, 0, v => typeof v === "string" && v.trim().toLowerCase() === "punter");
  if (headerIdx === -1) {
    headerIdx = findRowIndex(rows, 1, v => typeof v === "string" && v.toLowerCase().includes("bet per round"));
  }
  if (headerIdx === -1) throw new Error('Could not find the "Punters" header row in the Rounds sheet.');
  const headerRow = rows[headerIdx];

  // Round columns start at index 2; collect column index -> round number
  const roundCols = [];
  for (let c = 2; c < headerRow.length; c++) {
    const v = headerRow[c];
    if (typeof v === "number") roundCols.push({ col: c, round: v });
  }
  if (!upToRound) upToRound = roundCols.length ? Math.max(...roundCols.map(r => r.round)) : 0;
  const visibleCols = roundCols.filter(r => r.round <= upToRound);

  const punters = [];
  let totals = null;
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i] || [];
    const name = row[0];
    if (name === undefined || name === null || name === "") continue;
    const nameLower = String(name).toLowerCase();
    if (nameLower.includes("bets up to round") || nameLower === "punters") continue;
    const entry = {
      name: String(name),
      perRound: row[1],
      rounds: visibleCols.map(rc => (row[rc.col] === undefined ? null : row[rc.col]))
    };
    if (typeof name === "string" && name.toLowerCase() === "total") {
      totals = entry;
      break;
    }
    punters.push(entry);
  }
  return { roundNumbers: visibleCols.map(r => r.round), punters, totals, upToRound };
}

function renderLeaderboard(summary) {
  const head = document.getElementById("leaderboard-head");
  head.innerHTML = `<th>Punter</th><th>Total Bet</th><th>Total Return</th><th>% Return</th>`;

  const body = document.getElementById("leaderboard-body");
  body.innerHTML = "";

  const sorted = [...summary.punters].sort((a, b) => (Number(b.pct) || 0) - (Number(a.pct) || 0));
  const rankClass = i => i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";

  sorted.forEach((p, i) => {
    const pctVal = Number(p.pct);
    const pctClass = pctVal >= 1 ? "pct-pos" : "pct-neg";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="name-cell"><span class="rank ${rankClass(i)}">${i + 1}</span>${p.name}</td>
      <td>${money(p.bet)}</td>
      <td>${money(p.ret)}</td>
      <td class="${pctClass}">${pct(p.pct)}</td>
    `;
    body.appendChild(tr);
  });

  if (summary.totals) {
    const t = summary.totals;
    const tr = document.createElement("tr");
    tr.className = "total-row";
    tr.innerHTML = `<td>Total</td><td>${money(t.bet)}</td><td>${money(t.ret)}</td><td>${pct(t.pct)}</td>`;
    body.appendChild(tr);
  }
}

function renderRounds(roundsData) {
  const head = document.getElementById("rounds-head");
  head.innerHTML = `<th>Punter</th><th>Bet / Round</th>` +
    roundsData.roundNumbers.map(r => `<th>R${r}</th>`).join("");

  document.getElementById("rounds-note").textContent =
    `Bets recorded through Round ${roundsData.upToRound}`;

  const body = document.getElementById("rounds-body");
  body.innerHTML = "";

  roundsData.punters.forEach(p => {
    const cells = p.rounds.map(v =>
      (v === null || v === undefined || v === "") ? `<td class="empty-cell">—</td>` : `<td>${money(v)}</td>`
    ).join("");
    const tr = document.createElement("tr");
    tr.innerHTML = `<td class="name-cell">${p.name}</td><td>${money(p.perRound)}</td>${cells}`;
    body.appendChild(tr);
  });

  if (roundsData.totals) {
    const t = roundsData.totals;
    const cells = t.rounds.map(v => `<td>${money(v)}</td>`).join("");
    const tr = document.createElement("tr");
    tr.className = "total-row";
    tr.innerHTML = `<td>Total</td><td>${money(t.perRound)}</td>${cells}`;
    body.appendChild(tr);
  }
}

function renderWorkbook(workbook, sourceLabel) {
  try {
    showError("");
    const summarySheetName = workbook.SheetNames.find(n => n.toLowerCase().includes("summary")) || workbook.SheetNames[0];
    const roundsSheetName = workbook.SheetNames.find(n => n.toLowerCase().includes("round")) || workbook.SheetNames[1];

    const summaryRows = XLSX.utils.sheet_to_json(workbook.Sheets[summarySheetName], { header: 1, raw: true });
    const roundsRows = XLSX.utils.sheet_to_json(workbook.Sheets[roundsSheetName], { header: 1, raw: true });

    const summary = parseSummarySheet(summaryRows);
    const roundsData = parseRoundsSheet(roundsRows);

    renderLeaderboard(summary);
    renderRounds(roundsData);

    if (sourceLabel) document.getElementById("file-status").textContent = sourceLabel;
    document.getElementById("status-dot").className = "status-dot";
  } catch (err) {
    showError("Could not read that file as a Punters Club Puntoff workbook: " + err.message);
    document.getElementById("status-dot").className = "status-dot stale";
  }
}

const XLSX_FILENAME = "Punters Club Puntoff.xlsx";

async function loadFromRepo() {
  const statusEl = document.getElementById("file-status");
  const dotEl = document.getElementById("status-dot");
  try {
    statusEl.textContent = "Loading latest data\u2026";
    const url = encodeURI(XLSX_FILENAME) + "?_=" + Date.now();
    const response = await fetch(url, { cache: "no-store" });
    if (!response.ok) {
      throw new Error(`Couldn't fetch "${XLSX_FILENAME}" (HTTP ${response.status})`);
    }
    const buffer = await response.arrayBuffer();
    const workbook = XLSX.read(new Uint8Array(buffer), { type: "array" });
    const stamp = new Date().toLocaleString();
    renderWorkbook(workbook, `Updated ${stamp}`);
  } catch (err) {
    dotEl.className = "status-dot stale";
    showError(`Couldn't load "${XLSX_FILENAME}" from the repo: ${err.message}`);
    statusEl.textContent = "Couldn't load data";
  }
}

loadFromRepo();
</script>
</body>
</html>
