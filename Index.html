<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Punters Club Puntoff</title>
<style>
  :root {
    --bg: #0f1720;
    --panel: #161f2b;
    --border: #26323f;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #4fd1c5;
    --gold: #d4af37;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --pos: #4caf50;
    --neg: #e57373;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 16px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 32px;
    font-size: 0.95rem;
  }
  .section {
    max-width: 1200px;
    margin: 0 auto 40px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    overflow-x: auto;
  }
  .section h2 {
    margin-top: 0;
    font-size: 1.2rem;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    font-size: 0.9rem;
    min-width: 600px;
  }
  th, td {
    padding: 8px 12px;
    text-align: right;
    white-space: nowrap;
  }
  th:first-child, td:first-child {
    text-align: left;
  }
  thead th {
    color: var(--muted);
    font-weight: 600;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--panel);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
  }
  tbody tr:hover {
    background: rgba(255,255,255,0.03);
  }
  tbody tr.total-row {
    font-weight: 700;
    border-top: 2px solid var(--border);
    color: var(--text);
  }
  .rank-1 td:first-child { color: var(--gold); font-weight: 700; }
  .rank-2 td:first-child { color: var(--silver); font-weight: 700; }
  .rank-3 td:first-child { color: var(--bronze); font-weight: 700; }
  .pct-pos { color: var(--pos); }
  .pct-neg { color: var(--neg); }
  .empty-cell { color: #3a4552; }
  .note {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 14px;
  }
  .rounds-table th, .rounds-table td {
    padding: 6px 8px;
    font-size: 0.82rem;
  }
  .rounds-table td.filled {
    color: var(--text);
  }
  .scroll-hint {
    color: var(--muted);
    font-size: 0.78rem;
    text-align: right;
    margin-top: 6px;
  }
</style>
</head>
<body>

<h1>Punters Club Puntoff</h1>
<div class="subtitle">Leaderboard &amp; round-by-round results</div>

<div class="section">
  <h2>Summary — Leaderboard</h2>
  <table>
    <thead>
      <tr>
        <th>Punter</th>
        <th>Total Bet</th>
        <th>Total Return</th>
        <th>% Return</th>
      </tr>
    </thead>
    <tbody id="summary-body"></tbody>
  </table>
</div>

<div class="section">
  <h2>Rounds</h2>
  <div class="note">Bets recorded up to Round 6.</div>
  <table class="rounds-table">
    <thead>
      <tr id="rounds-header"></tr>
    </thead>
    <tbody id="rounds-body"></tbody>
  </table>
</div>

<script>
const summary = [
  ["Beau", 120, 195.74, 1.631167],
  ["Bins", 120, 190, 1.583333],
  ["Chim", 120, 180.37, 1.503083],
  ["Phil", 120, 157.35, 1.31125],
  ["Joicey", 120, 146, 1.216667],
  ["Kabes", 120, 139, 1.158333],
  ["Wilso", 120, 89.19, 0.74325],
  ["Groom", 120, 84, 0.7],
  ["Pete", 120, 70, 0.583333],
  ["Quaifey", 120, 30.94, 0.257833],
];
const summaryTotal = ["Total", 1200, 1282.59, 1.068825];

const summaryBody = document.getElementById("summary-body");
summary.forEach((row, i) => {
  const tr = document.createElement("tr");
  if (i === 0) tr.classList.add("rank-1");
  else if (i === 1) tr.classList.add("rank-2");
  else if (i === 2) tr.classList.add("rank-3");
  const pctClass = row[3] >= 1 ? "pct-pos" : "pct-neg";
  tr.innerHTML = `
    <td>${row[0]}</td>
    <td>${row[1].toFixed(2)}</td>
    <td>${row[2].toFixed(2)}</td>
    <td class="${pctClass}">${(row[3]*100).toFixed(1)}%</td>
  `;
  summaryBody.appendChild(tr);
});
const totalTr = document.createElement("tr");
totalTr.classList.add("total-row");
totalTr.innerHTML = `
  <td>${summaryTotal[0]}</td>
  <td>${summaryTotal[1].toFixed(2)}</td>
  <td>${summaryTotal[2].toFixed(2)}</td>
  <td>${(summaryTotal[3]*100).toFixed(1)}%</td>
`;
summaryBody.appendChild(totalTr);

// Rounds data
const ROUNDS_SHOWN = 6;
const roundsHeaderRow = ["Punters", "Bet per Round"];
for (let i = 1; i <= ROUNDS_SHOWN; i++) roundsHeaderRow.push("R" + i);

const roundsData = [
  ["Beau", 20, [43.74,null,null,null,88,64]],
  ["Bins", 20, [null,40,null,null,null,150]],
  ["Chim", 20, [44.7,null,null,70,null,65.67]],
  ["Phil", 20, [82.35,null,null,75,null,null]],
  ["Joicey", 20, [80,null,null,66,null,null]],
  ["Kabes", 20, [34,null,null,37.5,67.5,null]],
  ["Wilso", 20, [44.19,null,25,null,20,null]],
  ["Groom", 20, [null,null,null,null,34,50]],
  ["Pete", 20, [null,null,null,70,null,null]],
  ["Quaifey", 20, [null,null,null,null,12.44,18.5]],
];
const roundsTotal = ["Total", 200, [328.98,40,25,318.5,221.94,348.17]];

const roundsHeader = document.getElementById("rounds-header");
roundsHeaderRow.forEach(h => {
  const th = document.createElement("th");
  th.textContent = h;
  roundsHeader.appendChild(th);
});

function buildRoundsRow(name, betPerRound, values, isTotal) {
  const tr = document.createElement("tr");
  if (isTotal) tr.classList.add("total-row");
  let cells = `<td>${name}</td><td>${betPerRound}</td>`;
  for (let i = 0; i < ROUNDS_SHOWN; i++) {
    const v = values[i];
    if (v === null || v === undefined) {
      cells += `<td class="empty-cell">—</td>`;
    } else {
      cells += `<td class="filled">${v.toFixed(2)}</td>`;
    }
  }
  tr.innerHTML = cells;
  return tr;
}

const roundsBody = document.getElementById("rounds-body");
roundsData.forEach(r => {
  const values = new Array(ROUNDS_SHOWN).fill(null);
  r[2].forEach((v, i) => values[i] = v);
  roundsBody.appendChild(buildRoundsRow(r[0], r[1], values, false));
});
const totalValues = new Array(ROUNDS_SHOWN).fill(0);
roundsTotal[2].forEach((v,i) => totalValues[i] = v);
roundsBody.appendChild(buildRoundsRow(roundsTotal[0], roundsTotal[1], totalValues, true));
</script>

</body>
</html>
